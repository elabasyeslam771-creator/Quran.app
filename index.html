                           {icon:'fa-heart-broken',title:'أدعية الأموات',desc:'11 دعاء',section:'mayet-duas'},
                           {icon:'fa-cloud-moon',title:'قيام الليل',desc:'دليل كامل',section:'qiyam'},
                           {icon:'fa-heart',title:'الرقية الشرعية',desc:'آيات وأدعية',section:'ruqya'}
                        ].map(card => `
                            <div class="feature-card" onclick="navigateTo('${card.section}')">
                                <div class="card-icon"><i class="fas ${card.icon}"></i></div>
                                <h3>${card.title}</h3><p>${card.desc}</p>
                            </div>`).join('')}
                    </div>
                </section>`;
        }

        function buildQuranSection() {
            const opts = allSurahsList.map(s => `<option value="${s.number}">${s.number}. ${s.name}</option>`).join('');
            return `
                <section class="section" id="quran">
                    <div class="quran-container">
                        <div class="quran-header"><h2>القرآن الكريم كاملاً</h2><p>معرفة الجزء لكل سورة</p></div>
                        <div class="surah-navigation">
                            <select class="surah-select" id="surahSelect" onchange="loadSurah()">${opts}</select>
                        </div>
                        <div class="quran-content" id="quranContent"><p style="text-align:center;padding:2rem;">اختر سورة لعرضها</p></div>
                    </div>
                </section>`;
        }

        function buildTasbih() {
            return `
                <section class="section" id="tasbih">
                    <div class="tasbih-main-container">
                        <div class="tasbih-counter-box">
                            <div id="currentZekrLabel" style="font-size:1.5rem;color:var(--gold);">سبحان الله</div>
                            <div class="counter-display" id="counterDisplay">0</div>
                            <div style="display:flex;gap:1rem;justify-content:center;">
                                <button class="counter-btn btn-increment" id="incrementBtn">+ تسبيحة</button>
                                <button class="counter-btn btn-reset" id="resetBtn">تصفير</button>
                            </div>
                        </div>
                        <div class="tasbih-presets" id="zekrPresets"></div>
                    </div>
                </section>`;
        }

        function buildStaticAzkar(id, title) {
            return `<section class="section" id="${id}"><h2 style="text-align:center;color:var(--primary);padding:1rem;">${title}</h2><div class="azkar-container" id="${id}Container"></div></section>`;
        }

        function buildQiyam() {
            return `
                <section class="section" id="qiyam">
                    <h2 style="text-align:center;color:var(--primary);">كيفية صلاة قيام الليل</h2>
                    <div class="qiyam-layout">
                        <div class="qiyam-table"><table><tr><th>الخطوة</th><th>الوصف</th></tr>
                            <tr><td>1</td><td>النية</td></tr><tr><td>2</td><td>الوضوء</td></tr>
                            <tr><td>3</td><td>ركعتان ركعتان</td></tr><tr><td>4</td><td>القراءة</td></tr>
                            <tr><td>5</td><td>الوتر</td></tr></table></div>
                        <div class="info-card"><h4>أفضل وقت</h4><p>الثلث الأخير من الليل</p></div>
                    </div>
                </section>`;
        }

        function loadAllContent() {
            const main = document.getElementById('mainContent');
            main.innerHTML = buildHome() + buildQuranSection() + buildTasbih() +
                buildStaticAzkar('azkar-morning', 'أذكار الصباح') +
                buildStaticAzkar('azkar-evening', 'أذكار المساء') +
                buildStaticAzkar('dua', 'الأدعية المأثورة') +
                buildStaticAzkar('mayet-duas', 'أدعية الأموات') +
                buildStaticAzkar('ruqya', 'الرقية الشرعية') +
                buildQiyam();
        }

        // ========== عرض الأذكار والأدعية ==========
        function renderAzkar(data, containerId) {
            const container = document.getElementById(containerId);
            if(!container) return;
            let filtered = data;
            if(activeFilter === 'completed' && data[0]?.category) filtered = data.filter(item => completedAzkar[item.id]);
            else if(activeFilter === 'not-completed' && data[0]?.category) filtered = data.filter(item => !completedAzkar[item.id]);
            
            container.innerHTML = filtered.map(item => {
                const done = completedAzkar[item.id];
                return `<div class="zekr-card ${done?'completed':''}">
                    <div style="flex:1;"><p class="zekr-text">${item.zekr}</p><small>${item.source || ''}</small></div>
                    <div style="display:flex;align-items:center;gap:1rem;">
                        ${item.count ? `<span style="background:var(--primary);color:#fff;padding:5px 10px;border-radius:10px;">${item.count}x</span>` : ''}
                        ${item.id ? `<button class="zekr-complete-btn ${done?'completed-btn':''}" onclick="toggleZekr(${item.id},'${containerId}','${item.category}')">${done?'✅':'⬜'}</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // دالة مخصصة لعرض أدعية الأموات (لا تحتوي على أزرار إتمام)
        function renderMayetDuas() {
            const container = document.getElementById('mayet-duasContainer');
            if(!container) return;
            container.innerHTML = mayetDuaData.map(item => `
                <div class="zekr-card">
                    <div style="flex:1;"><p class="zekr-text">${item.zekr}</p><small>${item.source}</small></div>
                </div>
            `).join('');
        }

        window.toggleZekr = function(id, containerId, category) {
            if(completedAzkar[id]) delete completedAzkar[id]; else completedAzkar[id]=true;
            localStorage.setItem('completedAzkar', JSON.stringify(completedAzkar));
            if(category === 'morning') renderAzkar(morningAzkarData, 'morningAzkarContainer');
            else if(category === 'evening') renderAzkar(eveningAzkarData, 'eveningAzkarContainer');
            else if(category === 'dua') renderAzkar(duaData, 'duaContainer');
        };

        function renderDuaList() { renderAzkar(duaData, 'duaContainer'); }
        function renderRuqya() { renderAzkar(ruqyaData, 'ruqyaContainer'); }

        // ========== تحميل السورة مع الجزء ==========
        async function loadSurah() {
            const num = parseInt(document.getElementById('surahSelect').value);
            const content = document.getElementById('quranContent');
            if(!num) return;
            content.innerHTML = '<div style="text-align:center;padding:2rem;">جاري التحميل...</div>';
            try {
                const res = await fetch(`${QURAN_API}/surah/${num}/ar.uthmani`);
                const data = await res.json();
                const surah = allSurahsList.find(s=>s.number===num);
                const juz = juzInfo[num] || '';
                let html = `<div style="text-align:center;margin-bottom:1rem;"><strong>سورة ${surah.name}</strong> (${surah.type}) - الجزء ${juz} - عدد الآيات ${surah.ayahs}</div>`;
                if(num!==9 && num!==1) html += `<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
                html += data.data.ayahs.map(a => `<div class="ayah"><span class="ayah-number">${a.numberInSurah}</span><span>${a.text}</span></div>`).join('');
                content.innerHTML = html;
            } catch(e) {
                content.innerHTML = '<p style="text-align:center;color:red;">تعذر تحميل السورة. تأكد من الاتصال بالإنترنت.</p>';
            }
        }

        // ========== التسبيح ==========
        function setupTasbih() {
            const presets = [
                "سبحان الله", "الحمد لله", "الله أكبر", "لا إله إلا الله",
                "أستغفر الله", "لا حول ولا قوة إلا بالله", "سبحان الله وبحمده",
                "سبحان الله العظيم", "سبحان الله وبحمده سبحان الله العظيم",
                "اللهم صل على محمد", "حسبي الله ونعم الوكيل", "تبارك الله أحسن الخالقين",
                "اللهم اغفر لي ولوالدي"
            ];
            document.getElementById('zekrPresets').innerHTML = presets.map(z => 
                `<button class="preset-btn ${z===currentZekr?'active-preset':''}" onclick="selectZekr('${z}')">${z}</button>`
            ).join('');
            let count = 0;
            const incBtn = document.getElementById('incrementBtn');
            const resBtn = document.getElementById('resetBtn');
            if(incBtn) incBtn.onclick = () => { count++; document.getElementById('counterDisplay').textContent = count; };
            if(resBtn) resBtn.onclick = () => { count=0; document.getElementById('counterDisplay').textContent='0'; };
        }
        window.selectZekr = function(z) {
            currentZekr = z;
            document.getElementById('currentZekrLabel').textContent = z;
            // تحديث الأزرار النشطة
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active-preset'));
            const btns = document.querySelectorAll('.preset-btn');
            btns.forEach(b => { if(b.textContent === z) b.classList.add('active-preset'); });
            localStorage.setItem('currentZekr', z);
        };

        // ========== التنقل ==========
        function navigateTo(sectionId) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const navItem = document.querySelector(`[data-section="${sectionId}"]`);
            if(navItem) navItem.classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const sec = document.getElementById(sectionId);
            if(sec) sec.classList.add('active');
            
            // تعبئة المحتوى الديناميكي عند التفعيل
            if(sectionId === 'azkar-morning') renderAzkar(morningAzkarData, 'morningAzkarContainer');
            if(sectionId === 'azkar-evening') renderAzkar(eveningAzkarData, 'eveningAzkarContainer');
            if(sectionId === 'dua') renderDuaList();
            if(sectionId === 'mayet-duas') renderMayetDuas();
            if(sectionId === 'ruqya') renderRuqya();
        }

        // ========== PWA ==========
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'block';
        });
        window.installApp = function() {
            if(deferredPrompt) { deferredPrompt.prompt(); }
        };

        // ========== بدء التشغيل ==========
        function init() {
            buildNavigation();
            loadAllContent();
            setupTasbih();
            // استعادة العداد
            if(localStorage.getItem('tasbihCount')) {
                tasbihCount = parseInt(localStorage.getItem('tasbihCount'));
                document.getElementById('counterDisplay').textContent = tasbihCount;
            }
            if('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js').catch(()=>{});
            }
            // الوضع الليلي
            const toggle = document.getElementById('themeToggle');
            if(localStorage.getItem('darkMode')==='true') {
                document.body.classList.add('dark-mode');
                toggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
            toggle.addEventListener('click',()=>{
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDark);
                toggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
