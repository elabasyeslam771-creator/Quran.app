        :root { --primary: #1a7a5a; --primary-light: #2daf87; --gold: #c9a24d; --dark: #1a1a2e; --light: #faf8f5; --white: #ffffff; --gray: #eae7e2; --text: #2c3e50; }

        body { font-family:'Cairo',sans-serif; background:var(--light); color:var(--text); line-height:1.8; }

        .header-container { max-width:1400px; margin:0 auto; padding:0 2rem; display:flex; justify-content:space-between; align-items:center; }
        .logo { display:flex; align-items:center; gap:12px; cursor:pointer; }
        .logo-icon { width:55px; height:55px; background:linear-gradient(135deg,var(--gold),#e0c77d); border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:var(--dark); animation:pulse 2s infinite; transform:rotate(-5deg); }
        @keyframes pulse { 0%,100%{box-shadow:0 0 25px rgba(201,162,77,0.4);} 50%{box-shadow:0 0 50px rgba(201,162,77,0.8);} }
        .logo-text { color:#fff; font-size:1.6rem; font-weight:900; } .logo-text span { color:var(--gold); }
        .theme-toggle { background:rgba(255,255,255,0.1); border:none; color:var(--gold); width:45px; height:45px; border-radius:15px; cursor:pointer; font-size:1.2rem; }
        .nav-menu { background:var(--white); position:sticky; top:90px; z-index:999; box-shadow:0 4px 20px rgba(0,0,0,0.08); border-bottom:2px solid var(--gray); }
        .nav-container { max-width:1400px; margin:0 auto; display:flex; overflow-x:auto; padding:0 2rem; }
        .nav-item { padding:15px 22px; white-space:nowrap; cursor:pointer; font-weight:700; border-bottom:4px solid transparent; display:flex; align-items:center; gap:8px; }
        .nav-item i { color:var(--gold); }
        .nav-item.active { color:var(--primary); border-bottom-color:var(--primary); background:rgba(26,122,90,0.05); }
        .main-content { max-width:1400px; margin:2rem auto; padding:0 2rem; }
        .section { display:none; animation:fadeInUp 0.6s; }
        .section.active { display:block; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(40px);} to{opacity:1;transform:translateY(0);} }
        .welcome-card { background:linear-gradient(135deg,#1a7a5a,#0d4f3a); border-radius:30px; padding:4rem 3rem; text-align:center; color:#fff; margin-bottom:2rem; }
        .quran-verse { font-family:'Amiri Quran','Scheherazade New',serif; font-size:2rem; color:#e0c77d; margin:1.5rem 0; line-height:2.2; }
        .cards-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem; margin:2.5rem 0; }
        .feature-card { background:var(--white); border-radius:20px; padding:2rem; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.08); cursor:pointer; border:2px solid transparent; transition:all 0.3s; }
        .feature-card:hover { transform:translateY(-10px); border-color:var(--gold); }
        .card-icon { width:70px; height:70px; background:var(--primary); border-radius:20px; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; font-size:2rem; color:#fff; }
        .badge { background:var(--gold); color:var(--dark); padding:5px 15px; border-radius:50px; font-size:0.8rem; font-weight:700; display:inline-block; margin-top:0.5rem; }
        .quran-container { background:var(--white); border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,0.12); overflow:hidden; }
        .quran-header { background:linear-gradient(135deg,#0d4f3a,var(--primary)); padding:2rem; text-align:center; color:#fff; }
        .surah-navigation { display:flex; gap:1rem; padding:1.5rem; background:var(--gray); flex-wrap:wrap; justify-content:center; }
        .surah-select { padding:12px 25px; border-radius:50px; border:2px solid var(--primary); font-family:'Cairo',sans-serif; font-size:1rem; background:var(--white); }
        .quran-content { padding:2rem; max-height:600px; overflow-y:auto; }
        .bismillah { text-align:center; font-family:'Amiri Quran',serif; font-size:2.5rem; color:var(--primary); margin:1.5rem 0; }
        .ayah { font-family:'Amiri Quran','Scheherazade New',serif; font-size:1.6rem; line-height:2.5; padding:0.8rem; margin:0.5rem 0; border-radius:12px; display:flex; gap:10px; }
        .ayah:hover { background:var(--gray); }
        .ayah-number { min-width:35px; height:35px; background:var(--primary); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; margin-top:5px; }
        .tasbih-main-container { display:grid; grid-template-columns:1fr 1fr; gap:2rem; }
        @media(max-width:768px){ .tasbih-main-container{grid-template-columns:1fr;} }
        .tasbih-counter-box { background:var(--white); border-radius:20px; padding:2.5rem; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.12); }
        .counter-display { font-size:5rem; font-weight:900; color:var(--primary); font-family:'Noto Kufi Arabic',sans-serif; background:var(--gray); border-radius:20px; padding:1.5rem; border:3px solid var(--primary-light); }
        .counter-btn { padding:14px 35px; border:none; border-radius:50px; font-weight:700; cursor:pointer; transition:0.3s; }
        .btn-increment { background:var(--primary); color:#fff; }
        .btn-reset { background:var(--gray); }
        .preset-btn { padding:15px; background:var(--gray); border:2px solid transparent; border-radius:12px; cursor:pointer; font-weight:600; }
        .preset-btn.active-preset { border-color:var(--primary); background:rgba(26,122,90,0.1); }
        .azkar-container { display:grid; gap:1rem; }
        .zekr-card { background:var(--white); border-radius:20px; padding:1.8rem; box-shadow:0 4px 20px rgba(0,0,0,0.08); border-right:5px solid var(--primary); display:flex; justify-content:space-between; align-items:center; }
        .zekr-text { font-size:1.15rem; font-weight:600; }
        .zekr-complete-btn { width:45px; height:45px; border-radius:50%; border:2px solid #28a745; background:transparent; color:#28a745; cursor:pointer; }
        .qiyam-layout { display:grid; grid-template-columns:1fr 1fr; gap:2rem; }
        .qiyam-table { background:var(--white); border-radius:20px; overflow:hidden; }
        .qiyam-table th { background:var(--primary); color:#fff; padding:1rem; }

        .info-card { background:var(--white); border-radius:20px; padding:1.5rem; border-right:4px solid var(--gold); }
        .footer { background:var(--dark); color:rgba(255,255,255,0.7); text-align:center; padding:2.5rem; margin-top:3rem; border-top:3px solid var(--gold); }

        .dark-mode { --light:#1a1a2e; --white:#16213e; --gray:#2a2a4a; --text:#e0e0e0; }
        .install-banner { position:fixed; bottom:20px; right:20px; background:var(--primary); color:#fff; padding:15px 25px; border-radius:20px; z-index:9999; display:none; cursor:pointer; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>

        }

        function buildAzkarSection(id,title,icon) {
            return `<section class="section" id="${id}"><h2 style="color:var(--primary);text-align:center;"><i class="fas ${icon}"></i> ${title}</h2><div class="azkar-container" id="${id}Container"></div></section>`;
        }

        function buildQiyamSection() {
            return `
                <section class="section" id="qiyam">
                    <h2 style="text-align:center;color:var(--primary);">كيفية صلاة قيام الليل</h2>
                    <div class="qiyam-layout">
                        <div class="qiyam-table"><table><tr><th>الخطوة</th><th>الوصف</th></tr>
                            <tr><td>1</td><td>النية</td></tr><tr><td>2</td><td>الوضوء</td></tr>
                            <tr><td>3</td><td>ركعتان ركعتان</td></tr><tr><td>4</td><td>القراءة</td></tr>
                            <tr><td>5</td><td>الوتر</td></tr></table></div>
                        <div class="info-card"><h4>أفضل وقت</h4><p>الثلث الأخير من الليل</p></div>
                    </div>
                </section>`;
        }

        async function loadContent() {
            const main = document.getElementById('mainContent');
            main.innerHTML = buildHome() + 
                await buildQuranSection() + 
                buildTasbihSection() + 
                buildAzkarSection('azkar-morning','أذكار الصباح','fa-sun') +
                buildAzkarSection('azkar-evening','أذكار المساء','fa-moon') +
                buildAzkarSection('dua','الأدعية','fa-pray') +
                buildAzkarSection('ruqya','الرقية الشرعية','fa-heart') +
                buildQiyamSection();
        }

        function navigateTo(sectionId) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector(`[data-section="${sectionId}"]`).classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }

        // ========== تحميل السور ==========
        async function loadSurah() {
            const num = document.getElementById('surahSelect').value;
            const content = document.getElementById('quranContent');
            if(!num) return;
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const res = await fetch(`${QURAN_API}/surah/${num}/ar.uthmani`);
                const data = await res.json();
                let html = `<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
                html += data.data.ayahs.map(a => 
                    `<div class="ayah"><span class="ayah-number">${a.numberInSurah}</span><span class="ayah-text">${a.text}</span></div>`
                ).join('');
                content.innerHTML = html;
            } catch(e) {
                content.innerHTML = '<p style="text-align:center;padding:2rem;">تحتاج اتصال بالإنترنت لتحميل السورة</p>';
            }
        }

        // ========== التسبيح ==========
        function setupTasbih() {
            const presets = ["سبحان الله","الحمد لله","الله أكبر","لا إله إلا الله","أستغفر الله"];
            document.getElementById('zekrPresets').innerHTML = presets.map(z => 
                `<button class="preset-btn" onclick="selectZekr('${z}')">${z}</button>`
            ).join('');
        }
        function selectZekr(z) { document.getElementById('currentZekrLabel').textContent = z; }

        // ========== بدء التشغيل ==========
        async function init() {
            buildNavigation();
            await loadContent();
            setupTasbih();
            // ربط الأحداث
            let count = 0;
            document.getElementById('incrementBtn')?.addEventListener('click',()=>{
                count++; document.getElementById('counterDisplay').textContent = count;
            });
            document.getElementById('resetBtn')?.addEventListener('click',()=>{count=0;document.getElementById('counterDisplay').textContent='0';});
        }
        document.addEventListener('DOMContentLoaded', init);

        // ========== PWA Install ==========
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'block';
        });
        function installApp() {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    document.getElementById('installBanner').style.display = 'none';
                });
            }
        }

        // Service Worker Registration
        if('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
